<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sertai Kelas | REAL-MPC</title>
    
    <!-- Google Fonts & Font Awesome Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600;700;800&family=Fredoka:wght=600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #0f172a;
            --accent-blue: #2563eb;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --grad-blue: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.3s ease; }
        body { background-color: #f4f7fc; color: var(--text-dark); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }

        .container { background: white; border-radius: 28px; padding: 40px; width: 100%; max-width: 480px; border: 1px solid #e2e8f0; box-shadow: 0 20px 40px rgba(15, 23, 42, 0.05); }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-family: 'Fredoka', sans-serif; font-size: 2rem; color: var(--primary); }
        .header h1 span { color: var(--accent-blue); }
        .header p { color: var(--text-muted); font-size: 0.95rem; margin-top: 5px; font-weight: 500; }

        .info-box { background: #eff6ff; border-left: 5px solid var(--accent-blue); padding: 15px; border-radius: 12px; margin-bottom: 25px; }
        .info-box p { font-size: 0.9rem; font-weight: 600; color: #1e40af; }
        .info-box span { display: block; font-size: 1.1rem; font-weight: 800; color: var(--primary); margin-top: 4px; }

        .form-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
        .form-group label { font-size: 0.85rem; font-weight: 700; text-transform: uppercase; color: var(--primary); letter-spacing: 0.5px; }
        .form-group input { width: 100%; padding: 14px 16px; border: 2px solid #e2e8f0; border-radius: 14px; font-size: 1rem; font-weight: 600; outline: none; background: #f8fafc; }
        .form-group input:focus { border-color: var(--accent-blue); background: #fff; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }
        
        .btn { width: 100%; padding: 16px; border-radius: 14px; font-size: 1rem; font-weight: 700; cursor: pointer; border: none; color: white; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-primary { background: var(--grad-blue); box-shadow: 0 8px 20px rgba(37, 99, 235, 0.2); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 25px rgba(37, 99, 235, 0.3); }
        .btn:disabled { background: #cbd5e1; cursor: not-allowed; transform: none; box-shadow: none; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>REAL-<span>MPC</span></h1>
            <p>Pendaftaran Masuk Bilik Darjah</p>
        </div>

        <!-- Paparan Nama Kelas Automatik Dari URL -->
        <div class="info-box">
            <p><i class="fa-solid fa-graduation-cap"></i> Anda bakal menyertai kelas:</p>
            <span id="nama-kelas-papar">Memuatkan maklumat kelas...</span>
        </div>

        <form id="form-daftar-link">
            <div class="form-group">
                <label>No. Kad Pengenalan (Tanpa -)</label>
                <input type="text" id="input-ic" required placeholder="Contoh: 081215085431" maxlength="12" pattern="\d*">
            </div>
            
            <div class="form-group">
                <label>Nama Penuh Pelajar</label>
                <input type="text" id="input-nama" required placeholder="Sila taip nama penuh anda" style="text-transform: uppercase;">
            </div>

            <button type="submit" class="btn btn-primary" id="btn-submit">
                <i class="fa-solid fa-user-plus"></i> Sahkan & Sertai Kelas
            </button>
        </form>
    </div>

    <!-- ================= FIRESTORE DATABASE LOGIC ================= -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDzWmeMvmMwNsEEiFmnr9PRtw6nNjIUGRg",
            authDomain: "real-mpc-module-6be02.firebaseapp.com",
            projectId: "real-mpc-module-6be02",
            storageBucket: "real-mpc-module-6be02.firebasestorage.app",
            messagingSenderId: "1045888004132",
            appId: "1:1045888004132:web:869de28a286506f15ea8b1",
            measurementId: "G-XD3VQ7JKKB"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 1. DAPATKAN KOD KELAS DARI URL (E.g. join-kelas.html?id=B3X7P)
        const urlParams = new URLSearchParams(window.location.search);
        const kodKelas = urlParams.get('id') ? urlParams.get('id').toUpperCase() : null;

        if (!kodKelas) {
            document.getElementById('nama-kelas-papar').innerText = "Pautan tidak sah!";
            document.getElementById('nama-kelas-papar').style.color = "#ef4444";
            document.getElementById('btn-submit').disabled = true;
            alert("Ralat: Kod ID kelas tidak ditemui pada pautan URL.");
        } else {
            // Ambil nama kelas untuk paparan info box
            ambilInfoKelas();
        }

        async function ambilInfoKelas() {
            try {
                const kelasRef = doc(db, "kelas", kodKelas);
                const kelasSnap = await getDoc(kelasRef);
                if (kelasSnap.exists()) {
                    document.getElementById('nama-kelas-papar').innerText = kelasSnap.data().namaKelas;
                } else {
                    document.getElementById('nama-kelas-papar').innerText = "Kelas tidak wujud!";
                    document.getElementById('nama-kelas-papar').style.color = "#ef4444";
                    document.getElementById('btn-submit').disabled = true;
                }
            } catch (error) {
                console.error(error);
            }
        }

        // 2. LOGIK SEMAKAN KESAPADAN NAMA + IC & SERTAI KELAS
        document.getElementById('form-daftar-link').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const inputIC = document.getElementById('input-ic').value.trim();
            const inputNama = document.getElementById('input-nama').value.trim().toUpperCase();
            const btnSubmit = document.getElementById('btn-submit');

            btnSubmit.disabled = true;
            btnSubmit.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin"></i> Menyemak Identiti...`;

            try {
                // Rujuk fail pelajar berdasarkan ID dokumen (No IC)
                const pelajarRef = doc(db, "pelajar", inputIC);
                const pelajarSnap = await getDoc(pelajarRef);

                // SEKATAN 1: Jika No IC langsung tidak berdaftar dalam DB
                if (!pelajarSnap.exists()) {
                    alert("Ralat: No. Kad Pengenalan ini tidak ditemui dalam sistem pendaftaran REAL-MPC. Sila daftar akaun pelajar terlebih dahulu!");
                    btnSubmit.disabled = false;
                    btnSubmit.innerHTML = `<i class="fa-solid fa-user-plus"></i> Sahkan & Sertai Kelas`;
                    return;
                }

                // Dapatkan nama sebenar dalam DB (terima namaPenuh atau nama)
                const dataPelajar = pelajarSnap.data();
                const namaSebenarDB = (dataPelajar.namaPenuh || dataPelajar.nama || "").trim().toUpperCase();

                // SEKATAN 2: Jika IC betul, tapi nama yang ditaip salah / tidak sepadan dengan pemilik IC asal
                if (inputNama !== namaSebenarDB) {
                    alert(`Ralat Pengesahan: Nama Penuh yang ditaip tidak sepadan dengan No. IC yang diberikan!\n\nSila pastikan anda memasukkan NAMA PENUH anda sendiri.`);
                    btnSubmit.disabled = false;
                    btnSubmit.innerHTML = `<i class="fa-solid fa-user-plus"></i> Sahkan & Sertai Kelas`;
                    return;
                }

                // JIKA LEPAS KEDUA-DUA SEKATAN, BARU UPDATE MASUK KELAS
                const kelasRef = doc(db, "kelas", kodKelas);
                await updateDoc(kelasRef, {
                    senaraiPelajar: arrayUnion(inputIC)
                });

                // Simpan dalam session supaya bila buka dashboard, dia terus kenal pelajar ini
                sessionStorage.setItem("pelajar_ic", inputIC);

                alert(`Tahniah ${namaSebenarDB}! Identiti anda disahkan. Anda berjaya didaftarkan ke dalam kelas.`);
                
                // Terus bawa mereka ke halaman kelas saya
                window.location.href = "kelas-pelajar.html";

            } catch (error) {
                console.error("Ralat pendaftaran:", error);
                alert("Sistem mengalami ralat teknikal semasa memproses pengesahan.");
                btnSubmit.disabled = false;
                btnSubmit.innerHTML = `<i class="fa-solid fa-user-plus"></i> Sahkan & Sertai Kelas`;
            }
        });
    </script>
</body>
</html>
