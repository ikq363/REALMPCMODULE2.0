<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelas Saya | REAL-MPC</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Fredoka:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #0f172a;
            --accent-orange: #ff7a00;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --grad-pink: linear-gradient(135deg, #ec4899 0%, #f43f5e 100%);
            --grad-orange: linear-gradient(135deg, #ff7a00 0%, #ff5500 100%);
            --grad-blue: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            --grad-emerald: linear-gradient(135deg, #10b981 0%, #059669 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.3s ease; }
        body { background-color: #f4f7fc; color: var(--text-dark); min-height: 100vh; display: flex; }

        .sidebar {
            width: 280px; background: linear-gradient(180deg, #0f172a 0%, #1e1b4b 100%); color: white;
            padding: 30px 20px; display: flex; flex-direction: column; justify-content: space-between;
            min-height: 100vh; position: fixed; left: 0; top: 0; box-shadow: 10px 0 30px rgba(0,0,0,0.1); z-index: 100;
        }
        .logo-area { text-align: center; margin-bottom: 40px; }
        .logo-area h2 { font-family: 'Fredoka', sans-serif; font-size: 1.8rem; letter-spacing: 1px; }
        .logo-area h2 span { color: #ff7a00; }
        .logo-area p { font-size: 0.75rem; opacity: 0.6; text-transform: uppercase; letter-spacing: 2px; margin-top: 5px; }
        .menu-list { list-style: none; display: flex; flex-direction: column; gap: 12px; flex-grow: 1; }
        .menu-item {
            display: flex; align-items: center; gap: 16px; padding: 14px 20px; color: rgba(255,255,255,0.7);
            text-decoration: none; font-weight: 600; font-size: 1rem; border-radius: 16px;
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .menu-item.active { background: var(--grad-pink); color: white; box-shadow: 0 8px 20px rgba(236, 72, 153, 0.4); }
        .menu-item:hover { background: rgba(255,255,255,0.1); color: white; transform: translateX(8px); }
        .logout-btn { background: rgba(244, 63, 94, 0.1); color: #f43f5e; border: 1px solid rgba(244, 63, 94, 0.2); cursor: pointer; }
        
        .main-content { margin-left: 280px; padding: 40px; width: calc(100% - 280px); }
        .top-bar { background: rgba(255, 255, 255, 0.85); padding: 25px 30px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); margin-bottom: 40px; }
        
        .content-grid { display: grid; grid-template-columns: 360px 1fr; gap: 30px; }
        .card { background: white; border-radius: 24px; padding: 30px; border: 1px solid #e2e8f0; height: fit-content; }
        .card-title { font-size: 1.25rem; font-weight: 700; margin-bottom: 25px; display: flex; align-items: center; gap: 10px; color: var(--primary); }
        
        .form-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
        .form-group label { font-size: 0.85rem; font-weight: 700; text-transform: uppercase; color: var(--primary); }
        .form-group input { width: 100%; padding: 14px 16px; border: 2px solid #e2e8f0; border-radius: 14px; font-size: 0.95rem; font-weight: 600; background: #f8fafc; }
        .btn { width: 100%; padding: 14px; border-radius: 14px; font-weight: 700; cursor: pointer; border: none; color: white; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-primary { background: var(--grad-orange); }

        .result-box { margin-top: 25px; padding: 20px; background: #fff7ed; border: 2px dashed #ffedd5; border-radius: 16px; display: none; }
        .info-label { font-size: 0.8rem; font-weight: 700; color: #c2410c; text-transform: uppercase; }
        .info-value { font-family: monospace; font-size: 1.1rem; font-weight: 700; color: #9a3412; }
        .link-value { font-size: 0.85rem; word-break: break-all; background: white; padding: 10px; border-radius: 10px; border: 1px solid #fed7aa; display: block; margin-top: 5px; }
        .btn-copy { background: #0f172a; font-size: 0.75rem; padding: 6px 12px; border-radius: 8px; width: auto; display: inline-flex; margin-top: 8px; }

        .gallery-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px; }
        .class-box { background: white; border: 1px solid #e2e8f0; border-radius: 24px; padding: 25px; display: flex; flex-direction: column; justify-content: space-between; }
        .class-badge { background: #f1f5f9; color: var(--text-muted); font-size: 0.75rem; font-weight: 700; padding: 4px 10px; border-radius: 8px; display: inline-block; margin-bottom: 10px; }
        .class-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; padding-top: 15px; border-top: 1px dashed #e2e8f0; }
        .action-buttons { display: flex; gap: 6px; align-items: center; }
        .btn-view-class { background: var(--primary); color: white; font-size: 0.85rem; padding: 8px 14px; border-radius: 12px; border: none; cursor: pointer; }
        .btn-delete { background: #fee2e2; color: #ef4444; padding: 8px 12px; border-radius: 12px; border: none; cursor: pointer; }
        .btn-delete:hover { background: #ef4444; color: white; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(4px); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; border-radius: 28px; width: 90%; max-width: 600px; padding: 35px; }
        .modal-table { width: 100%; border-collapse: collapse; }
        .modal-table th { padding: 12px; background: #f8fafc; font-size: 0.75rem; text-transform: uppercase; text-align: left; }
        .modal-table td { padding: 14px 12px; border-bottom: 1px solid #f1f5f9; font-weight: 600; }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="logo-area"><h2>REAL-<span>MPC</span></h2><p>Panel Pengajar</p></div>
        <div class="menu-list">
            <a href="dashboard-pengajar.html" class="menu-item"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
            <a href="kelas-pengajar.html" class="menu-item active"><i class="fa-solid fa-school"></i> Kelas Saya</a>
        </div>
        <a onclick="sessionStorage.clear(); window.location.href='login-pengajar.html';" class="menu-item logout-btn">
            <i class="fa-solid fa-right-from-bracket"></i> Log Keluar
        </a>
    </nav>

    <main class="main-content">
        <header class="top-bar"><h1>Pengurusan Kelas Saya</h1></header>

        <section class="content-grid">
            <div class="card">
                <div class="card-title"><i class="fa-solid fa-circle-plus" style="color:var(--accent-orange)"></i>Daftar Kelas</div>
                <form id="form-daftar-kelas">
                    <div class="form-group"><label>Nama Kelas</label><input type="text" id="nama-kelas" required></div>
                    <div class="form-group"><label>Subjek</label><input type="text" id="subjek-kelas" required></div>
                    <button type="submit" class="btn btn-primary"><i class="fa-solid fa-rocket"></i> Jana Kelas</button>
                </form>
                <div class="result-box" id="papar-kod-box">
                    <div class="info-label">Kod Kelas:</div><span class="info-value" id="text-kod-kelas"></span>
                    <div class="link-value" id="text-link-kelas"></div>
                </div>
            </div>

            <div>
                <div style="font-size: 1.25rem; font-weight: 700; margin-bottom: 20px;">Galeri Kelas</div>
                <div class="gallery-container" id="galeri-kelas-box"></div>
            </div>
        </section>
    </main>

    <div class="modal" id="modal-pelajar">
        <div class="modal-content">
            <div class="modal-header"><h2 id="modal-tajuk-kelas"></h2></div>
            <div class="modal-body"><table class="modal-table"><tbody id="modal-senarai-body"></tbody></table></div>
            <button onclick="document.getElementById('modal-pelajar').style.display='none'">Tutup</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, collection, getDocs, getDoc, updateDoc, arrayRemove, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { /* ... Masukkan konfigurasi anda di sini ... */ };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const base_url = window.location.origin + window.location.pathname.replace('kelas-pengajar.html', '');

        window.muatGaleriKelas = async function() {
            const galeriBox = document.getElementById('galeri-kelas-box');
            const querySnapshot = await getDocs(collection(db, "kelas"));
            galeriBox.innerHTML = '';
            querySnapshot.forEach((doc) => {
                const data = doc.data();
                const kod = doc.id;
                let divCard = document.createElement('div');
                divCard.className = 'class-box';
                divCard.innerHTML = `
                    <div>
                        <span class="class-badge">Kod: ${kod}</span>
                        <h3>${data.namaKelas}</h3>
                        <p>${data.subjek}</p>
                    </div>
                    <div class="class-footer">
                        <span>${data.senaraiPelajar?.length || 0} Pelajar</span>
                        <div class="action-buttons">
                            <button class="btn-view-class" onclick="bukaModalPelajar('${kod}', '${data.namaKelas}')"><i class="fa-solid fa-eye"></i></button>
                            <button class="btn-delete" onclick="hapusKelas('${kod}', '${data.namaKelas}')"><i class="fa-solid fa-trash-can"></i></button>
                        </div>
                    </div>
                `;
                galeriBox.appendChild(divCard);
            });
        }

        window.hapusKelas = async function(kodKelas, namaKelas) {
            if(confirm(`Padam kelas "${namaKelas}"? Tindakan ini tidak boleh dipatah balik.`)) {
                await deleteDoc(doc(db, "kelas", kodKelas));
                muatGaleriKelas();
            }
        }

        document.getElementById('form-daftar-kelas').addEventListener('submit', async (e) => {
            e.preventDefault();
            const kodRawak = Math.random().toString(36).substring(2, 7).toUpperCase();
            await setDoc(doc(db, "kelas", kodRawak), {
                namaKelas: document.getElementById('nama-kelas').value,
                subjek: document.getElementById('subjek-kelas').value,
                senaraiPelajar: []
            });
            alert("Kelas berjaya didaftarkan!");
            muatGaleriKelas();
        });

        muatGaleriKelas();
    </script>
</body>
</html>
