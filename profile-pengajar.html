<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Pengajar | REAL-MPC</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Fredoka:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #0f172a;
            --accent-orange: #ff7a00;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --grad-pink: linear-gradient(135deg, #ec4899 0%, #f43f5e 100%);
            --grad-blue: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            --grad-purple: linear-gradient(135deg, #a855f7 0%, #7e22ce 100%);
            --grad-emerald: linear-gradient(135deg, #10b981 0%, #059669 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: all 0.3s ease;
        }

        body {
            background-color: #f4f7fc;
            background-image: radial-gradient(#e2e8f0 1.5px, transparent 1.5px);
            background-size: 30px 30px;
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
        }

        /* --- SIDEBAR NAVIGATION --- */
        .sidebar {
            width: 280px;
            background: linear-gradient(180deg, #0f172a 0%, #1e1b4b 100%);
            color: white;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            box-shadow: 10px 0 30px rgba(0,0,0,0.1);
            z-index: 100;
        }

        .logo-area {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-area h2 {
            font-family: 'Fredoka', sans-serif;
            font-size: 1.8rem;
            letter-spacing: 1px;
        }

        .logo-area h2 span { color: #ff7a00; }
        .logo-area p { font-size: 0.75rem; opacity: 0.6; text-transform: uppercase; letter-spacing: 2px; margin-top: 5px; }

        .menu-list { list-style: none; display: flex; flex-direction: column; gap: 12px; flex-grow: 1; }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 14px 20px;
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .menu-item.active { background: var(--grad-pink); color: white; box-shadow: 0 8px 20px rgba(236, 72, 153, 0.4); }
        .menu-item:hover { background: rgba(255,255,255,0.1); color: white; transform: translateX(8px); }
        .menu-item i { font-size: 1.2rem; width: 25px; }

        .logout-btn { background: rgba(244, 63, 94, 0.1); color: #f43f5e; border: 1px solid rgba(244, 63, 94, 0.2); cursor: pointer; }
        .logout-btn:hover { background: #f43f5e; color: white !important; box-shadow: 0 8px 20px rgba(244, 63, 94, 0.4); }

        /* --- MAIN CONTENT AREA --- */
        .main-content {
            margin-left: 280px;
            padding: 40px;
            width: calc(100% - 280px);
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            background: rgba(255, 255, 255, 0.85);
            padding: 25px 30px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            border: 1px solid rgba(255,255,255,0.5);
            backdrop-filter: blur(10px);
        }

        .welcome-msg h1 { font-size: 1.8rem; font-weight: 800; }
        .welcome-msg p { color: var(--text-muted); font-size: 0.95rem; margin-top: 4px; }

        /* --- PROFILE CARD CONTAINER --- */
        .profile-container {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 30px;
        }

        .avatar-card {
            background: white;
            border-radius: 24px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
            border: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: fit-content;
        }

        .avatar-box {
            width: 120px;
            height: 120px;
            background: #f1f5f9;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            color: var(--accent-orange);
            border: 4px solid #fff;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            margin-bottom: 20px;
        }

        .avatar-card h3 { font-size: 1.25rem; font-weight: 700; margin-bottom: 6px; word-break: break-word; }
        .avatar-card p { font-size: 0.85rem; color: white; background: var(--primary); padding: 4px 14px; border-radius: 100px; font-weight: 700; text-transform: uppercase; }

        .details-card {
            background: white;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
            border: 1px solid #e2e8f0;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            border: 2px solid #e2e8f0;
            border-radius: 14px;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-dark);
            background-color: #f8fafc;
            outline: none;
        }

        .input-wrapper input:not([disabled]) {
            background-color: #fff;
            border-color: var(--accent-orange);
        }

        .input-tip {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .btn-container {
            margin-top: 32px;
            display: flex;
            justify-content: flex-end;
            gap: 15px;
        }

        .btn {
            padding: 14px 28px;
            border-radius: 14px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            border: none;
        }

        .btn-edit { background: var(--primary); color: white; }
        .btn-edit:hover { background: #1e293b; transform: translateY(-2px); }

        .btn-save { background: var(--grad-emerald); color: white; display: none; }
        .btn-save:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3); }

        .btn-cancel { background: #e2e8f0; color: var(--text-dark); display: none; }
        .btn-cancel:hover { background: #cbd5e1; }

        @media (max-width: 992px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; min-height: auto; position: relative; padding: 20px; border-radius: 0 0 24px 24px; }
            .menu-list { flex-direction: row; flex-wrap: wrap; justify-content: center; gap: 10px; }
            .main-content { width: 100%; margin-left: 0; padding: 20px; }
            .profile-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="logo-area">
            <h2>REAL-<span>MPC</span></h2>
            <p>Panel Pengajar</p>
        </div>

        <div class="menu-list">
            <a href="dashboard-pengajar.html" class="menu-item">
                <i class="fa-solid fa-chart-line"></i> Dashboard
            </a>
            <a href="profile-pengajar.html" class="menu-item active">
                <i class="fa-solid fa-id-card-clip"></i> Profile
            </a>
            <a href="kelas-pengajar.html" class="menu-item">
                <i class="fa-solid fa-school"></i> Kelas Saya
            </a>
            <a href="modul-pengajar.html" class="menu-item">
                <i class="fa-solid fa-book-open-reader"></i> Modul
            </a>
            <a href="analisis-pengajar.html" class="menu-item">
                <i class="fa-solid fa-chart-pie"></i> Analisis
            </a>
        </div>

        <a onclick="logoutAkaun()" class="menu-item logout-btn">
            <i class="fa-solid fa-right-from-bracket"></i> Log Keluar
        </a>
    </nav>

    <main class="main-content">
        <header class="top-bar">
            <div class="welcome-msg">
                <h1>Profil Pengajar</h1>
                <p>Urusan bacaan dan kemas kini terus profil pendaftaran anda.</p>
            </div>
        </header>

        <section class="profile-container">
            <div class="avatar-card">
                <div class="avatar-box">
                    <i class="fa-solid fa-user-tie"></i>
                </div>
                <h3 id="side-nama">Pengajar</h3>
                <p>Status Aktif</p>
            </div>

            <div class="details-card">
                <form id="form-profil">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Nama Penuh Pengajar</label>
                            <div class="input-wrapper">
                                <i class="fa-solid fa-user"></i>
                                <input type="text" id="prof-nama" disabled required autocomplete="off" placeholder="Masukkan nama penuh">
                            </div>
                            <span class="input-tip">*Ditukar ke HURUF BESAR automatik</span>
                        </div>

                        <div class="form-group">
                            <label>No. Kad Pengenalan</label>
                            <div class="input-wrapper">
                                <i class="fa-solid fa-id-card"></i>
                                <input type="text" id="prof-ic" disabled required autocomplete="off" placeholder="Masukkan 12 digit No. IC">
                            </div>
                            <span class="input-tip">*ID Unik Utama Dokumen (12 digit tanpa '-')</span>
                        </div>
                    </div>

                    <div class="btn-container">
                        <button type="button" id="btn-ubah" class="btn btn-edit" onclick="aktifkanModEdit()">
                            <i class="fa-solid fa-user-pen"></i> Kemaskini Profil
                        </button>
                        <button type="button" id="btn-batal" class="btn btn-cancel" onclick="matikanModEdit()">Batal</button>
                        <button type="submit" id="btn-simpan" class="btn btn-save">
                            <i class="fa-solid fa-floppy-disk"></i> Simpan Perubahan
                        </button>
                    </div>
                </form>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, collection, getDocs, query, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDzWmeMvmMwNsEEiFmnr9PRtw6nNjIUGRg",
            authDomain: "real-mpc-module-6be02.firebaseapp.com",
            projectId: "real-mpc-module-6be02",
            storageBucket: "real-mpc-module-6be02.firebasestorage.app",
            messagingSenderId: "1045888004132",
            appId: "1:1045888004132:web:869de28a286506f15ea8b1",
            measurementId: "G-XD3VQ7JKKB"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Cari ID sasaran secara dinamik (Guna IC atau Nama daripada session jika ada)
        let sasarID = sessionStorage.getItem("pengajarIC") || sessionStorage.getItem("pengajarLogMasuk") || "";

        // Auto-format huruf besar semasa menaip nama
        document.getElementById('prof-nama').addEventListener('input', (e) => {
            e.target.value = e.target.value.toUpperCase();
        });
        
        // Auto-remove tanda sengkang (-) pada input IC
        document.getElementById('prof-ic').addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/\D/g, '');
        });

        // FUNGSI UTAMA: AMBIL DATA TERDAFTAR DARI FIREBASE
        async function ambilDataProfil() {
            try {
                // Skenario A: Jika ada maklumat ID dalam session, tarik dokumen itu
                if (sasarID) {
                    const docRef = doc(db, "pengajar", sasarID);
                    const docSnap = await getDoc(docRef);

                    if (docSnap.exists()) {
                        paparkanKeSkrin(docSnap.data());
                        return;
                    }
                }

                // Skenario B: Jika session kosong/hilang, cuba scan koleksi 'pengajar' untuk data paling atas
                const q = query(collection(db, "pengajar"), limit(1));
                const querySnapshot = await getDocs(q);
                
                if (!querySnapshot.empty) {
                    querySnapshot.forEach((doc) => {
                        sasarID = doc.id; // Set ID aktif baru
                        paparkanKeSkrin(doc.data());
                    });
                } else {
                    // Skenario C: Database kosong sepenuhnya (Pendaftaran Baru Pertama Kali)
                    document.getElementById('side-nama').innerText = "Profil Baru";
                }
            } catch (error) {
                console.error("Ralat memuatkan Firestore:", error);
            }
        }

        function paparkanKeSkrin(data) {
            const namaPaparan = data.namaPenuh || data.nama || "PENGANJAR";
            const icPaparan = data.noIC || data.ic || sasarID;

            document.getElementById('side-nama').innerText = namaPaparan;
            document.getElementById('prof-nama').value = namaPaparan;
            document.getElementById('prof-ic').value = icPaparan;
        }

        // Jalankan fungsi bacaan data sebaik page dibuka
        ambilDataProfil();

        // FUNGSI UTAMA: SIMPAN & EDIT DATA TERUS KEPADA DOKUMEN ASAL
        document.getElementById('form-profil').addEventListener('submit', async (e) => {
            e.preventDefault();

            const namaInput = document.getElementById('prof-nama').value.trim();
            const icInput = document.getElementById('prof-ic').value.trim();

            if (icInput.length < 5) {
                alert("Sila masukkan No. Kad Pengenalan yang sah.");
                return;
            }

            try {
                // Sentiasa gunakan No. IC input sebagai Document ID kekal untuk elak data double
                const docRef = doc(db, "pengajar", icInput);
                
                await setDoc(docRef, {
                    namaPenuh: namaInput,
                    noIC: icInput,
                    tarikhKemaskini: new Date().toISOString()
                }, { merge: true });

                // Kemaskini ID sasaran rujukan
                sasarID = icInput;
                sessionStorage.setItem("pengajarIC", icInput);
                sessionStorage.setItem("pengajarLogMasuk", namaInput);

                alert("Profil berjaya disimpan!");
                matikanModEdit();
                ambilDataProfil(); 
            } catch (error) {
                console.error("Ralat menyimpan data:", error);
                alert("Gagal menyimpan perubahan. Sila cuba lagi.");
            }
        });
    </script>

    <script>
        function aktifkanModEdit() {
            document.getElementById('prof-nama').disabled = false;
            document.getElementById('prof-ic').disabled = false;

            document.getElementById('btn-ubah').style.display = 'none';
            document.getElementById('btn-batal').style.display = 'block';
            document.getElementById('btn-simpan').style.display = 'block';
        }

        function matikanModEdit() {
            document.getElementById('prof-nama').disabled = true;
            document.getElementById('prof-ic').disabled = true;

            document.getElementById('btn-ubah').style.display = 'block';
            document.getElementById('btn-batal').style.display = 'none';
            document.getElementById('btn-simpan').style.display = 'none';
        }

        function logoutAkaun() {
            if(confirm("Adakah anda pasti untuk keluar?")) {
                sessionStorage.clear();
                window.location.href = "login-pengajar.html";
            }
        }
    </script>
</body>
</html>
