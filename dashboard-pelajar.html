<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Saya | REAL-MPC</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Fredoka:wght=600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --primary: #0f172a; --accent-blue: #2563eb; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: #f4f7fc; display: flex; min-height: 100vh; }

        /* --- SIDEBAR STATIK (SAMA UNTUK SEMUA FAIL) --- */
        .sidebar { width: 280px; background: #0f172a; color: white; padding: 30px 20px; display: flex; flex-direction: column; position: fixed; height: 100vh; }
        .logo-area { text-align: center; margin-bottom: 40px; }
        .logo-area h2 { font-family: 'Fredoka', sans-serif; font-size: 1.8rem; }
        .logo-area h2 span { color: var(--accent-blue); }
        .menu-list { list-style: none; display: flex; flex-direction: column; gap: 12px; flex-grow: 1; }
        .menu-item { display: flex; align-items: center; gap: 16px; padding: 14px 20px; color: rgba(255,255,255,0.7); text-decoration: none; font-weight: 600; border-radius: 16px; }
        .menu-item.active { background: var(--accent-blue); color: white; }
        .menu-item:hover { background: rgba(255,255,255,0.05); color: white; }
        .logout-btn { background: rgba(244, 63, 94, 0.1); color: #f43f5e; margin-top: auto; cursor: pointer; }

        /* --- MAIN CONTENT --- */
        .main-content { margin-left: 280px; padding: 40px; width: calc(100% - 280px); }
        .card { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .card h2 { margin-bottom: 25px; color: var(--primary); }
        .info-row { display: flex; margin-bottom: 15px; border-bottom: 1px solid #f1f5f9; padding-bottom: 10px; }
        .label { width: 150px; font-weight: 700; color: #64748b; }
    </style>
</head>
<body>

    <!-- SIDEBAR STATIK -->
    <nav class="sidebar">
        <div class="logo-area">
            <h2>REAL-<span>MPC</span></h2>
        </div>
        <div class="menu-list">
            <a href="dashboard-pelajar.html" class="menu-item"><i class="fa-solid fa-house"></i> Dashboard</a>
            <a href="profile-pelajar.html" class="menu-item active"><i class="fa-solid fa-user"></i> Profil Saya</a>
            <a href="kelas-pelajar.html" class="menu-item"><i class="fa-solid fa-graduation-cap"></i> Kelas Saya</a>
            <a href="modul-pelajar.html" class="menu-item"><i class="fa-solid fa-book"></i> Modul Pembelajaran</a>
        </div>
        <a onclick="sessionStorage.clear(); window.location.href='login-pelajar.html';" class="menu-item logout-btn">
            <i class="fa-solid fa-right-from-bracket"></i> Log Keluar
        </a>
    </nav>

    <!-- MAIN CONTENT -->
    <main class="main-content">
        <div class="card">
            <h2>Maklumat Profil Pelajar</h2>
            <div id="profil-data">
                <div class="info-row"><div class="label">Nama Penuh:</div><span id="nama-display">-</span></div>
                <div class="info-row"><div class="label">No. IC:</div><span id="ic-display">-</span></div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { /* SAMA DENGAN YG DAHULU */ };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const icPelajar = sessionStorage.getItem("pelajar_ic");
        if(icPelajar) {
            const docRef = doc(db, "pelajar", icPelajar);
            getDoc(docRef).then(snap => {
                if(snap.exists()){
                    document.getElementById('nama-display').innerText = snap.data().namaPenuh;
                    document.getElementById('ic-display').innerText = icPelajar;
                }
            });
        }
    </script>
</body>
</html>
