<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Saya | REAL-MPC</title>
    
    <!-- Google Fonts & FontAwesome -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Fredoka:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --sidebar-bg: #0f172a; --accent: #2563eb; --bg: #f8fafc; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { display: flex; min-height: 100vh; background-color: var(--bg); }

        /* --- SIDEBAR (KEKAL 4 MENU SAHAJA) --- */
        .sidebar { width: 260px; background: var(--sidebar-bg); color: white; padding: 25px; display: flex; flex-direction: column; position: fixed; height: 100%; }
        .logo { font-family: 'Fredoka', sans-serif; font-size: 1.5rem; margin-bottom: 40px; color: white; text-decoration: none; display: block; }
        .logo span { color: var(--accent); }
        .menu { list-style: none; display: flex; flex-direction: column; gap: 10px; flex-grow: 1; }
        .menu a { text-decoration: none; color: #94a3b8; padding: 12px 15px; border-radius: 10px; display: flex; align-items: center; gap: 12px; font-weight: 600; transition: 0.3s; }
        .menu a:hover, .menu a.active { background: var(--accent); color: white; }
        .logout { margin-top: auto; color: #ef4444; font-weight: 600; cursor: pointer; padding: 12px; }

        /* --- CONTENT --- */
        .main { margin-left: 260px; padding: 40px; width: calc(100% - 260px); }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .card h2 { margin-bottom: 20px; color: #1e293b; }
        .info-group { margin-bottom: 15px; }
        .label { font-size: 0.9rem; color: #64748b; font-weight: 600; }
        .value { font-size: 1.1rem; color: #1e293b; font-weight: 700; margin-bottom: 5px; }
    </style>
</head>
<body>

    <!-- SIDEBAR STATIK (SALIN BAHAGIAN INI KE FAIL LAIN) -->
    <nav class="sidebar">
        <a href="#" class="logo">REAL-<span>MPC</span></a>
        <div class="menu">
            <a href="dashboard-pelajar.html"><i class="fa-solid fa-house"></i> Dashboard</a>
            <a href="profile-pelajar.html" class="active"><i class="fa-solid fa-user"></i> Profil Saya</a>
            <a href="kelas-pelajar.html"><i class="fa-solid fa-graduation-cap"></i> Kelas Saya</a>
            <a href="modul-pelajar.html"><i class="fa-solid fa-book"></i> Modul Pembelajaran</a>
        </div>
        <a onclick="window.location.href='login-pelajar.html'" class="logout"><i class="fa-solid fa-right-from-bracket"></i> Log Keluar</a>
    </nav>

    <!-- CONTENT -->
    <main class="main">
        <div class="card">
            <h2>Profil Pelajar</h2>
            <div class="info-group">
                <div class="label">Nama Penuh</div>
                <div class="value" id="nama-display">-</div>
            </div>
            <div class="info-group">
                <div class="label">No. Kad Pengenalan</div>
                <div class="value" id="ic-display">-</div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Gantikan dengan firebaseConfig cikgu yang sedia ada
        const firebaseConfig = { /* ... */ }; 
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const ic = sessionStorage.getItem("pelajar_ic");
        if(ic) {
            getDoc(doc(db, "pelajar", ic)).then(snap => {
                if(snap.exists()){
                    document.getElementById('nama-display').innerText = snap.data().namaPenuh;
                    document.getElementById('ic-display').innerText = ic;
                }
            });
        }
    </script>
</body>
</html>
