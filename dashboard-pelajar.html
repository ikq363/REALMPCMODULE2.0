<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Pelajar | REAL-MPC</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Fredoka:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-dark: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --text-dark: #1e293b;
            --grad-orange: linear-gradient(135deg, #ff7a00 0%, #ff5100 100%);
            --grad-cyan: linear-gradient(135deg, #06b6d4 0%, #0891b2 100%);
            --grad-indigo: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            --grad-rose: linear-gradient(135deg, #f43f5e 0%, #e11d48 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background-color: #f8fafc;
            background-image: radial-gradient(#cbd5e1 1.2px, transparent 1.2px);
            background-size: 24px 24px;
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
        }

        .glow { position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.4; z-index: -1; }
        .glow-1 { top: -50px; right: 10%; width: 350px; height: 350px; background: #06b6d4; }
        .glow-2 { bottom: 50px; left: 30%; width: 300px; height: 300px; background: #6366f1; }

        .sidebar {
            width: 280px; background: linear-gradient(180deg, #1e1b4b 0%, #0f172a 100%);
            color: white; padding: 30px 20px; display: flex; flex-direction: column;
            justify-content: space-between; min-height: 100vh; position: fixed;
            left: 0; top: 0; box-shadow: 10px 0 30px rgba(0,0,0,0.05); z-index: 100;
        }

        .logo-area { text-align: center; margin-bottom: 40px; }
        .logo-area h2 { font-family: 'Fredoka', sans-serif; font-size: 1.8rem; letter-spacing: 1px; }
        .logo-area h2 span { color: #06b6d4; }
        .logo-area p { font-size: 0.75rem; opacity: 0.7; text-transform: uppercase; letter-spacing: 2px; margin-top: 5px; }

        .menu-list { list-style: none; display: flex; flex-direction: column; gap: 12px; flex-grow: 1; }
        .menu-item {
            display: flex; align-items: center; gap: 16px; padding: 14px 20px;
            color: rgba(255,255,255,0.7); text-decoration: none; font-weight: 600;
            font-size: 1rem; border-radius: 16px; background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.3s;
        }
        .menu-item:hover { transform: translateX(8px); color: white; background: rgba(255,255,255,0.1); }
        .menu-item i { font-size: 1.2rem; width: 25px; }
        .logout-btn { background: rgba(244, 63, 94, 0.1); color: #f43f5e; border: 1px solid rgba(244, 63, 94, 0.2); cursor: pointer; }
        .logout-btn:hover { background: #f43f5e; color: white !important; }

        .main-content { margin-left: 280px; padding: 40px; width: calc(100% - 280px); position: relative; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; background: var(--glass-bg); padding: 25px 30px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.02); border: 1px solid rgba(255,255,255,0.6); backdrop-filter: blur(10px); }
        .welcome-msg h1 { font-size: 1.8rem; font-weight: 800; color: #0f172a; }
        .user-profile-badge { display: flex; align-items: center; gap: 12px; background: #06b6d4; color: white; padding: 10px 20px; border-radius: 100px; font-weight: 700; font-size: 0.85rem; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 400px)); gap: 30px; }
        .stat-card { padding: 35px; border-radius: 28px; color: white; position: relative; overflow: hidden; background: var(--grad-cyan); box-shadow: 0 15px 35px rgba(6, 182, 212, 0.15); }
        .bg-icon { position: absolute; right: -15px; bottom: -15px; font-size: 7.5rem; opacity: 0.2; }
        .stat-card p { font-size: 1rem; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; opacity: 0.9; }
        .stat-card h2 { font-size: 3.8rem; font-weight: 800; margin: 15px 0 10px 0; }
        .stat-card span { font-size: 0.9rem; background: rgba(255,255,255,0.25); padding: 6px 14px; border-radius: 100px; }

        .loading { 
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>

    <nav class="sidebar">
        <div class="logo-area">
            <h2>REAL-<span>MPC</span></h2>
            <p>Portal Pelajar</p>
        </div>

        <div class="menu-list">
            <a href="dashboard-pelajar.html" class="menu-item"><i class="fa-solid fa-house"></i> Dashboard</a>
            <a href="profile-pelajar.html" class="menu-item"><i class="fa-solid fa-user-graduate"></i> Profile Saya</a>
            <a href="kelas-pelajar.html" class="menu-item"><i class="fa-solid fa-school"></i> Kelas Saya</a>
            <a href="modul-pelajar.html" class="menu-item"><i class="fa-solid fa-book-open"></i> Modul</a>
        </div>

        <a onclick="logoutAkaun()" class="menu-item logout-btn" style="margin-top: 20px;">
            <i class="fa-solid fa-right-from-bracket"></i> Log Keluar
        </a>
    </nav>

    <main class="main-content">
        <header class="top-bar">
            <div class="welcome-msg">
                <h1 id="paparan-nama-pelajar">Memuatkan...</h1>
                <p>Selamat datang! Sedia untuk meneroka ilmu baharu hari ini?</p>
            </div>
            <div class="user-profile-badge">
                <i class="fa-solid fa-star"></i> AKUN PELAJAR
            </div>
        </header>

        <section class="stats-grid">
            <div class="stat-card">
                <i class="fa-solid fa-school bg-icon"></i>
                <p>Jumlah Kelas Disertai</p>
                <h2 id="total-kelas-pelajar"><span class="loading"></span></h2>
                <span><i class="fa-solid fa-circle-check"></i> Status Terkini</span>
            </div>
        </section>
    </main>

    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
            }
        }
    </script>

    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getFirestore, collection, query, where, onSnapshot } from "firebase/firestore";

        const firebaseConfig = {
            apiKey: "AIzaSyDzWmeMvmMwNsEEiFmnr9PRtw6nNjIUGRg",
            authDomain: "real-mpc-module-6be02.firebaseapp.com",
            projectId: "real-mpc-module-6be02",
            storageBucket: "real-mpc-module-6be02.firebasestorage.app",
            messagingSenderId: "1045888004132",
            appId: "1:1045888004132:web:869de28a286506f15ea8b1",
            measurementId: "G-XD3VQ7JKKB"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Get student name from session storage
        const namaPelajar = sessionStorage.getItem("pelajarLogMasuk");
        const displayElement = document.getElementById('paparan-nama-pelajar');
        
        if (namaPelajar) {
            displayElement.innerText = "Hai, " + namaPelajar + "!";
        } else {
            displayElement.innerText = "Selamat Datang, Pelajar!";
        }

        // Function to count classes joined by the student
        function updateStudentClasses() {
            const kelasCountElement = document.getElementById('total-kelas-pelajar');
            
            // If no student name, show 0
            if (!namaPelajar) {
                kelasCountElement.innerText = "0";
                return;
            }

            // Query the 'kelas' collection where 'pelajar' array contains the student name
            // Note: This assumes your Firestore structure has a 'pelajar' array field in each class document
            const kelasQuery = query(
                collection(db, "kelas"),
                where("pelajar", "array-contains", namaPelajar)
            );

            // Listen for real-time updates
            const unsubscribe = onSnapshot(kelasQuery, (snapshot) => {
                const totalKelas = snapshot.size;
                kelasCountElement.innerText = totalKelas;
                
                // Optional: Add animation or effect when count updates
                kelasCountElement.style.transition = 'all 0.3s ease';
                kelasCountElement.style.transform = 'scale(1.1)';
                setTimeout(() => {
                    kelasCountElement.style.transform = 'scale(1)';
                }, 300);
            }, (error) => {
                console.error("Error fetching class data:", error);
                kelasCountElement.innerText = "0";
            });

            // Return unsubscribe function for cleanup if needed
            return unsubscribe;
        }

        // Call the function to start listening
        const unsubscribeClasses = updateStudentClasses();

        // Cleanup listener when page is unloaded (optional)
        window.addEventListener('beforeunload', () => {
            if (unsubscribeClasses) {
                unsubscribeClasses();
            }
        });

        // Handle logout function
        window.logoutAkaun = function() {
            if(confirm("Adakah anda pasti untuk log keluar?")) {
                sessionStorage.clear();
                window.location.href = "login-pelajar.html";
            }
        };

        // Debug: Log current student name
        console.log("Student logged in:", namaPelajar);
    </script>
</body>
</html>
